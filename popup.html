<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      background: #0b0d14;
      color: #d4d8e8;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      background: #111420;
      border-bottom: 1px solid #1e2236;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .brand-name {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.3px;
      color: #f0f2ff;
    }

    .brand-tag {
      font-size: 9px;
      color: #4b5280;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #4b5280;
      transition: color 0.3s;
    }
    .toggle-status.on { color: #3b82f6; }

    .switch { position: relative; width: 42px; height: 23px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .knob {
      position: absolute; inset: 0;
      background: #1e2236;
      border: 1px solid #2a2f4a;
      border-radius: 23px;
      cursor: pointer;
      transition: 0.3s;
    }
    .knob::after {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      background: #4b5280;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: 0.3s;
    }
    input:checked ~ .knob {
      background: #1a2540;
      border-color: #2563eb;
    }
    input:checked ~ .knob::after {
      background: #3b82f6;
      transform: translateX(19px);
      box-shadow: 0 0 8px #3b82f680;
    }

    /* ── Off state ── */
    #offPanel {
      padding: 28px 20px;
      text-align: center;
    }
    .off-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }
    .off-title { font-size: 14px; font-weight: 600; color: #4b5280; }
    .off-sub { font-size: 11px; color: #2e3354; margin-top: 4px; }

    /* ── On state ── */
    #onPanel { padding: 14px 16px 16px; }

    .field-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4b5280;
      margin-bottom: 5px;
    }

    .search-box {
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px;
      background: #111420;
      border: 1px solid #1e2236;
      border-radius: 8px;
      color: #d4d8e8;
      font-size: 13px;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #2563eb; }
    .search-input::placeholder { color: #2e3354; }

    .hints {
      font-size: 10px;
      color: #2e3354;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 5px;
      line-height: 1.6;
    }
    .hints span { color: #3b4a6b; }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .pages-select {
      padding: 8px 10px;
      background: #111420;
      border: 1px solid #1e2236;
      border-radius: 8px;
      color: #d4d8e8;
      font-size: 12px;
      font-family: 'Syne', sans-serif;
      outline: none;
      cursor: pointer;
      min-width: 110px;
    }

    .scrape-btn {
      flex: 1;
      padding: 9px 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: 0.2s;
    }
    .scrape-btn:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
    .scrape-btn:disabled {
      background: #1e2236;
      color: #4b5280;
      cursor: not-allowed;
    }

    /* ── Log ── */
    .log-wrap {
      margin-top: 12px;
      background: #080a10;
      border: 1px solid #131625;
      border-radius: 8px;
      overflow: hidden;
    }
    .log-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      background: #0e1020;
      border-bottom: 1px solid #131625;
    }
    .log-bar-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #2e3354;
    }
    .log-dots { display: flex; gap: 4px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1e2236;
    }
    .dot.r { background: #ef4444; }
    .dot.y { background: #f59e0b; }
    .dot.g { background: #22c55e; }

    .log {
      height: 130px;
      overflow-y: auto;
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      line-height: 1.7;
      color: #3b4a6b;
      scroll-behavior: smooth;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: #1e2236; border-radius: 2px; }

    .l { color: #3b4a6b; }
    .l.ok { color: #22c55e; }
    .l.info { color: #3b82f6; }
    .l.warn { color: #f59e0b; }
    .l.find { color: #8b5cf6; }

    /* ── Status bar ── */
    .status-bar {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #2e3354;
    }
    .status-text.active { color: #3b82f6; }
    .status-text.done { color: #22c55e; }

    .lead-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #2e3354;
    }
    .lead-counter span { color: #3b82f6; font-weight: 600; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🔎</div>
      <div>
        <div class="brand-name">Lead Scraper</div>
        <div class="brand-tag">via Google · Free</div>
      </div>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-status" id="statusLabel">OFF</span>
      <label class="switch">
        <input type="checkbox" id="mainToggle">
        <span class="knob"></span>
      </label>
    </div>
  </div>

  <!-- OFF Panel -->
  <div id="offPanel">
    <div class="off-icon">⚡</div>
    <div class="off-title">Scraper is OFF</div>
    <div class="off-sub">Toggle the switch to activate</div>
  </div>

  <!-- ON Panel -->
  <div id="onPanel" class="hidden">

    <div class="field-label">Search Query</div>
    <div class="search-box">
      <input type="text" class="search-input" id="queryInput"
             placeholder="medical spa owners North Carolina">
    </div>
    <div class="hints">
      <span>Try:</span> realtors Austin TX &nbsp;·&nbsp;
      gym owners Florida &nbsp;·&nbsp; dentists Phoenix AZ
    </div>

    <div class="controls">
      <select class="pages-select" id="pagesSelect">
        <option value="2">2 pages (~20)</option>
        <option value="3" selected>3 pages (~30)</option>
        <option value="5">5 pages (~50)</option>
      </select>
      <button class="scrape-btn" id="scrapeBtn">▶ Scrape Leads</button>
    </div>

    <div class="log-wrap">
      <div class="log-bar">
        <span class="log-bar-title">Activity Log</span>
        <div class="log-dots">
          <div class="dot r"></div>
          <div class="dot y"></div>
          <div class="dot g"></div>
        </div>
      </div>
      <div class="log" id="logBox">
        <div class="l info">Ready — enter a search and click Scrape.</div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-text" id="statusTxt">Idle</span>
      <span class="lead-counter" id="leadCount">Leads: <span>0</span></span>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
